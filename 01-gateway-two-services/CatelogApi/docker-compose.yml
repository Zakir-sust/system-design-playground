services:
  # Service names become DNS names on the Compose network.
  # M2 (YARP) and M3 (orders -> catalog HttpClient) will target http://catalog:8080,
  # so the names here must stay "catalog" and "orders".
  catalog:
    build: ./CatelogApi
    ports:
      - "8081:8080"

  orders:
    build: ./OrderApi
    ports:
      - "8082:8080"
