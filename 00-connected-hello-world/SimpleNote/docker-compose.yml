


services:
  mydb:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-firstdb}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

    volumes:
      - pgdata:/var/lib/postgresql/data
  
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"  
    ports:
      - "5341:80"
    volumes:
      - seqdata:/data
    
  api:
    build: ./SimpleNote
    ports: 
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "${POSTGRES_CONNECTION:-Server=mydb;Database=firstdb;User Id=postgres;Password=postgres;Port=5432}"
      Seq__ServerUrl: "${SEQ_SERVER_URL:-http://seq:80}"
    depends_on:
      mydb:
        condition: service_healthy
volumes:
  pgdata:
  seqdata: